<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>เกมจับคู่คำ-รูปภาพ ป.1 🧩</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  html,body { height:100%; }
  body {
    font-family:'Sarabun','Segoe UI',Tahoma,sans-serif;
    background: linear-gradient(160deg,#c7e9ff 0%,#e2f7d8 50%,#fff3b0 100%);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .screen {
    width:100%; max-width:720px; height:100%; max-height:900px;
    display:none; flex-direction:column; align-items:center; justify-content:flex-start;
    padding:54px 16px 20px; text-align:center; position:relative;
    overflow-y:auto;
  }
  #nameScreen, #endScreen { justify-content:center; }
  #gameScreen { max-width:1080px; }
  .screen.active { display:flex; }

  .big-btn {
    border:none; border-radius:28px; cursor:pointer;
    font-family:inherit; font-weight:bold;
    box-shadow:0 6px 0 rgba(0,0,0,.18);
    transition:transform .1s, box-shadow .1s, opacity .15s;
    touch-action:manipulation;
  }
  .big-btn:active { transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.18); }
  .big-btn:disabled { opacity:.45; cursor:default; box-shadow:0 6px 0 rgba(0,0,0,.1); }
  .big-btn:disabled:active { transform:none; }

  h1.title { font-size:clamp(26px,6vw,38px); color:#1d4e89; margin-bottom:8px; text-shadow:2px 2px 0 #fff; }
  .mascot { font-size:clamp(60px,16vw,96px); animation:bounce 1.6s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
  .subtitle { font-size:clamp(15px,3.6vw,19px); color:#40513b; margin:12px 0 22px; line-height:1.6; }
  .primary-btn {
    font-size:clamp(22px,5.5vw,28px); padding:18px 52px;
    background:linear-gradient(180deg,#7dd3fc,#38bdf8); color:#083344;
  }
  #nameInput {
    font-family:inherit; font-size:clamp(20px,5vw,26px); font-weight:bold;
    text-align:center; color:#1e293b;
    border:4px solid #60a5fa; border-radius:22px; outline:none;
    padding:12px 16px; width:min(80vw,320px); margin:8px 0 22px;
    background:#fff;
  }
  #nameInput:focus { border-color:#2563eb; }

  .home-btn {
    position:fixed; top:12px; left:14px; z-index:100;
    background:#fff; border-radius:20px; padding:8px 16px;
    font-size:clamp(14px,3.6vw,17px); font-weight:bold; color:#0f766e;
    box-shadow:0 3px 8px rgba(0,0,0,.15);
    text-decoration:none; display:flex; align-items:center; gap:6px;
  }
  .home-btn:active { transform:translateY(2px); }

  .topbar {
    width:100%; max-width:1040px;
    display:flex; justify-content:space-between; align-items:center; padding:0 4px;
    margin-bottom:10px; flex:none;
  }
  .pill {
    background:#fff; border-radius:22px; padding:6px 16px;
    font-size:clamp(16px,4vw,20px); font-weight:bold;
    box-shadow:0 3px 8px rgba(0,0,0,.12);
  }
  .round-text { color:#1d4ed8; }
  .stars-box { color:#b45309; }

  .instruction {
    font-size:clamp(13px,3.4vw,16px); color:#334155; font-weight:bold;
    margin-bottom:14px; flex:none; line-height:1.5;
    max-width:1040px;
  }

  .game-layout {
    display:flex; flex-wrap:wrap; gap:22px; justify-content:center; align-items:flex-start;
    width:100%; max-width:1040px; margin-bottom:14px; flex:none;
  }
  .left-col, .right-col { flex:1 1 380px; min-width:280px; max-width:480px; }

  .section-label {
    width:100%; text-align:left;
    font-size:clamp(14px,3.6vw,17px); font-weight:bold; color:#7c2d12;
    margin:0 0 10px; flex:none;
  }

  .picture-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(110px,1fr)); gap:22px 12px;
  }
  .pic-card {
    background:#fff; border-radius:22px; padding:14px 8px 20px;
    box-shadow:0 6px 14px rgba(0,0,0,.12);
    border:2px solid #eef2f7;
    display:flex; align-items:center; justify-content:center;
    position:relative;
    min-height:104px;
  }
  .pic-card img { width:72px; height:72px; object-fit:contain; -webkit-user-drag:none; pointer-events:none; }

  .answer-list {
    display:flex; flex-direction:column; gap:10px;
  }
  .answer-row {
    background:#fff; border-radius:16px; padding:10px 14px;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
    border:2px solid #eef2f7;
    display:flex; align-items:center; gap:12px;
  }
  .answer-num { font-weight:bold; color:#94a3b8; font-size:clamp(14px,3.6vw,17px); min-width:18px; }
  .answer-word { flex:1; text-align:left; font-weight:bold; color:#1e293b; font-size:clamp(15px,3.8vw,19px); }
  .drop-blank {
    width:48px; height:48px; border-radius:14px;
    border:3px dashed #cbd5e1; background:#f8fafc;
    display:flex; align-items:center; justify-content:center;
    flex:none; transition:border-color .15s, background .15s;
  }
  .drop-blank.correct { border-style:solid; border-color:#4ade80; background:#f0fdf4; }
  .drop-blank.wrong { border-style:solid; border-color:#f87171; background:#fef2f2; }
  .correct-hint { font-size:clamp(12px,3.2vw,14px); color:#16a34a; font-weight:bold; white-space:nowrap; }

  .letter-tag {
    background:linear-gradient(180deg,#fca5a5,#ef4444); color:#fff;
    font-weight:bold; box-shadow:0 3px 6px rgba(0,0,0,.25); border:2px solid #fff;
    display:flex; align-items:center; justify-content:center;
    cursor:grab; touch-action:none;
  }
  .letter-tag.dragging { cursor:grabbing; box-shadow:0 10px 20px rgba(0,0,0,.3); opacity:.95; z-index:999; }
  .pic-card .letter-tag {
    position:absolute; bottom:-14px; left:50%; transform:translateX(-50%);
    width:46px; height:46px; border-radius:50%;
    font-size:clamp(20px,5vw,25px);
  }
  .drop-blank .letter-tag {
    position:static; width:40px; height:40px; border-radius:10px;
    font-size:clamp(17px,4.2vw,21px);
  }

  #checkBtn {
    font-size:clamp(18px,4.6vw,22px); padding:14px 40px;
    background:linear-gradient(180deg,#86efac,#22c55e); color:#052e16;
    margin-bottom:10px;
  }

  .feedback {
    min-height:34px; font-size:clamp(17px,4.4vw,22px); font-weight:bold; flex:none;
  }
  .feedback.good { color:#15803d; }
  .feedback.info { color:#1d4ed8; }

  #endScreen h1 { font-size:clamp(26px,6vw,36px); color:#b45309; text-shadow:2px 2px 0 #fff; }
  #endScreen .trophy { font-size:clamp(56px,15vw,84px); animation:bounce 1.6s infinite; }
  #finalStars { font-size:clamp(19px,4.8vw,25px); color:#1e293b; margin:10px 0 14px; font-weight:bold; }
  #againBtn { font-size:clamp(19px,4.8vw,24px); padding:14px 40px; background:linear-gradient(180deg,#a78bfa,#8b5cf6); color:#fff; margin-top:14px; }
  .home-link-btn {
    font-size:clamp(16px,4vw,20px); padding:11px 30px; margin-top:12px;
    background:#e2e8f0; color:#334155; text-decoration:none;
    display:inline-flex; align-items:center; justify-content:center;
  }

  .board {
    background:#fff; border-radius:22px; padding:14px 18px;
    width:min(92vw,400px); box-shadow:0 8px 20px rgba(0,0,0,.15);
    max-height:34vh; overflow-y:auto;
  }
  .board h2 { font-size:clamp(17px,4.2vw,21px); color:#7c2d12; margin-bottom:8px; }
  .board table { width:100%; border-collapse:collapse; }
  .board td, .board th {
    padding:6px 4px; font-size:clamp(14px,3.8vw,18px); color:#334155;
    border-bottom:1px solid #f1f5f9; text-align:center;
  }
  .board th { color:#94a3b8; font-size:clamp(12px,3.2vw,14px); }
  .board tr.me { background:#fef9c3; font-weight:bold; }
  .board .rank1 td { color:#b45309; font-weight:bold; }
</style>
</head>
<body>

<a href="index.html" class="home-btn">🏠 หน้าหลัก</a>

<!-- หน้าใส่ชื่อ -->
<div class="screen active" id="nameScreen">
  <div class="mascot">🧩</div>
  <h1 class="title">เกมจับคู่คำ-รูปภาพ</h1>
  <p class="subtitle">ลากตัวอักษรไปวางหน้าคำที่ตรงกับภาพ<br>ตอบครบแล้วกดตรวจคำตอบ รับดาวสะสม ⭐</p>
  <p class="subtitle" id="greetLine" style="margin-top:-10px;"></p>
  <button class="big-btn primary-btn" id="startBtn">▶ เริ่มเล่น</button>
</div>

<!-- หน้าเล่นเกม -->
<div class="screen" id="gameScreen">
  <div class="topbar">
    <div class="pill round-text" id="roundText">รอบ 1/3</div>
    <div class="pill stars-box">⭐ <span id="starCount">0</span></div>
  </div>
  <div class="instruction">👉 ลากตัวอักษรสีแดงที่มุมภาพ ไปวางในช่องหน้าคำตอบที่ตรงกับภาพนั้น</div>

  <div class="game-layout">
    <div class="left-col">
      <div class="section-label">🖼️ ภาพ</div>
      <div class="picture-grid" id="pictureGrid"></div>
    </div>
    <div class="right-col">
      <div class="section-label">📝 คำตอบ</div>
      <div class="answer-list" id="answerList"></div>
    </div>
  </div>

  <button class="big-btn" id="checkBtn" disabled>✅ ตรวจคำตอบ</button>
  <div class="feedback" id="feedback"></div>
</div>

<!-- หน้าจบเกม -->
<div class="screen" id="endScreen">
  <div class="trophy">🏆</div>
  <h1>เก่งมาก!</h1>
  <div id="finalStars"></div>
  <div class="board">
    <h2>🏅 คะแนนสูงสุด</h2>
    <table>
      <thead><tr><th>ที่</th><th>ชื่อ</th><th>ดาว</th></tr></thead>
      <tbody id="boardBody"></tbody>
    </table>
  </div>
  <button class="big-btn" id="againBtn">🔄 เล่นอีกครั้ง</button>
  <a href="index.html" class="big-btn home-link-btn">🏠 กลับหน้าหลัก</a>
</div>

<script>
// ================== รูปภาพประกอบคำศัพท์ (ไฟล์จริงในโฟลเดอร์ images/) ==================
const PIC_KEYS = ["dokmai","mamuang","peesuea","krapao","rongtao","waenta","lookmaew","taobok","tonmai","nangsue","suapha","lookball","kaoee","pratu","rotfai","duangdao","prajan","pladao"];

function iconImg(key){
  return `<img src="images/${key}.png" alt="" draggable="false">`;
}

// ================== ชุดคำศัพท์ (3 ชุด ชุดละ 6 คู่ = 18 คู่) ==================
const MATCH_SETS = [
  [
    { key:"dokmai",  w:"ดอกไม้" },
    { key:"mamuang", w:"มะม่วง" },
    { key:"peesuea", w:"ผีเสื้อ" },
    { key:"krapao",  w:"กระเป๋า" },
    { key:"rongtao", w:"รองเท้า" },
    { key:"waenta",  w:"แว่นตา" },
  ],
  [
    { key:"lookmaew", w:"ลูกแมว" },
    { key:"taobok",   w:"เต่าบก" },
    { key:"tonmai",   w:"ต้นไม้" },
    { key:"nangsue",  w:"หนังสือ" },
    { key:"suapha",   w:"เสื้อผ้า" },
    { key:"lookball", w:"ลูกบอล" },
  ],
  [
    { key:"kaoee",    w:"เก้าอี้" },
    { key:"pratu",    w:"ประตู" },
    { key:"rotfai",   w:"รถไฟ" },
    { key:"duangdao", w:"ดวงดาว" },
    { key:"prajan",   w:"พระจันทร์" },
    { key:"pladao",   w:"ปลาดาว" },
  ],
];

const LETTERS = ["ก","ข","ค","ง","จ","ฉ","ช","ซ"];
const ALL_KEYS = PIC_KEYS;
const LB_KEY = "matching_game_p1_scores";
const DECOY_COUNT = 2;

let setOrder = [], setPointer = 0;
let roundIdx = 0, stars = 0;
let currentPairs = [], checkedRound = false;
const TOTAL_ROUNDS = MATCH_SETS.length;
const PER_ROUND = 6;

const $ = id => document.getElementById(id);
// ชื่อผู้เล่น — ใช้ชื่อที่ตั้งไว้ที่หน้าแรกของเว็บ ไม่ต้องพิมพ์ซ้ำทุกครั้ง
const NAME_KEY = "p1_player_name";
let playerName = (localStorage.getItem(NAME_KEY) || "").trim();
if (!playerName) location.href = "index.html";
else { const g = document.getElementById("greetLine"); if (g) g.textContent = `สวัสดี ${playerName}! พร้อมเล่นหรือยัง? 😊`; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function pickNextSet(){
  if (setPointer >= setOrder.length){
    setOrder = shuffle(MATCH_SETS.map((_, i) => i));
    setPointer = 0;
  }
  return MATCH_SETS[setOrder[setPointer++]];
}

// ================== เริ่มเกม ==================
function startGame(){
  roundIdx = 0; stars = 0;
  $("starCount").textContent = 0;
  showScreen("gameScreen");
  loadRound();
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(id).classList.add("active");
}

function loadRound(){
  roundIdx++;
  checkedRound = false;
  $("roundText").textContent = `รอบ ${roundIdx}/${TOTAL_ROUNDS}`;
  setFeedback("", "");

  const pairs = pickNextSet();
  const letters = shuffle([...LETTERS]);
  currentPairs = pairs.map((p, i) => ({ ...p, letter: letters[i] }));

  // ตัวเลือกหลอก — ภาพเพิ่มเติมที่ไม่มีคำตอบในรายการ (ใช้ตัวอักษรที่เหลือ)
  const usedKeys = currentPairs.map(p => p.key);
  const decoyKeys = shuffle(ALL_KEYS.filter(k => !usedKeys.includes(k))).slice(0, DECOY_COUNT);
  const decoys = decoyKeys.map((key, i) => ({ key, letter: letters[currentPairs.length + i] }));

  // ภาพ (สุ่มลำดับ ผสมของจริงกับตัวหลอก) — ตัวอักษรติดอยู่ที่มุมล่างกลางภาพ ลากออกมาได้เลย
  const grid = $("pictureGrid");
  grid.innerHTML = "";
  shuffle([...currentPairs, ...decoys]).forEach(p => {
    const card = document.createElement("div");
    card.className = "pic-card";
    card.dataset.key = p.key;
    card.innerHTML = iconImg(p.key);
    const tag = document.createElement("div");
    tag.className = "letter-tag";
    tag.textContent = p.letter;
    tag.dataset.letter = p.letter;
    tag.dataset.key = p.key;
    attachDrag(tag);
    card.appendChild(tag);
    grid.appendChild(card);
  });

  // รายการคำตอบ (สุ่มลำดับคำ) — ช่องว่างอยู่หน้าคำตอบ
  const list = $("answerList");
  list.innerHTML = "";
  shuffle([...currentPairs]).forEach((p, idx) => {
    const row = document.createElement("div");
    row.className = "answer-row";
    row.innerHTML = `<div class="answer-num">${idx + 1}.</div><div class="drop-blank" data-expected="${p.letter}"></div><div class="answer-word">${p.w}</div>`;
    list.appendChild(row);
  });

  const btn = $("checkBtn");
  btn.disabled = true;
  btn.classList.remove("done");
  updateCheckBtn();
}

function setFeedback(msg, cls){
  const f = $("feedback");
  f.textContent = msg; f.className = "feedback " + (cls || "");
}

function updateCheckBtn(){
  const total = document.querySelectorAll(".drop-blank").length;
  const filled = document.querySelectorAll(".drop-blank .letter-tag").length;
  $("checkBtn").disabled = checkedRound || (filled < total);
}

function homeCardOf(tile){
  return document.querySelector(`.pic-card[data-key="${tile.dataset.key}"]`);
}

// ================== เลื่อนจออัตโนมัติขณะลาก (สำหรับมือถือ ที่ลากออกนอกจอไม่ได้) ==================
let autoScrollRAF = null;
let dragPointerY = null;
const AUTOSCROLL_EDGE = 70;
const AUTOSCROLL_SPEED = 12;

function autoScrollStep(){
  if (dragPointerY == null){ autoScrollRAF = null; return; }
  const scrollEl = document.getElementById("gameScreen");
  const vh = window.innerHeight;
  let dy = 0;
  if (dragPointerY < AUTOSCROLL_EDGE){
    dy = -AUTOSCROLL_SPEED * (1 - dragPointerY / AUTOSCROLL_EDGE);
  } else if (dragPointerY > vh - AUTOSCROLL_EDGE){
    dy = AUTOSCROLL_SPEED * (1 - (vh - dragPointerY) / AUTOSCROLL_EDGE);
  }
  if (dy !== 0 && scrollEl) scrollEl.scrollTop += dy;
  autoScrollRAF = requestAnimationFrame(autoScrollStep);
}
function startAutoScroll(){
  if (!autoScrollRAF) autoScrollRAF = requestAnimationFrame(autoScrollStep);
}
function stopAutoScroll(){
  dragPointerY = null;
  if (autoScrollRAF){ cancelAnimationFrame(autoScrollRAF); autoScrollRAF = null; }
}

// ================== ระบบลาก-วาง (Pointer Events รองรับทั้งเมาส์และทัช) ==================
// ตัวอักษรเริ่มติดอยู่ที่มุมภาพ ลากไปวางที่ช่องคำตอบได้โดยตรง
// ถ้าวางผิดที่ หรือถูกสลับออก จะเด้งกลับไปที่ภาพเดิมของมันเอง
function attachDrag(tile){
  tile.addEventListener("pointerdown", ev => {
    if (checkedRound) return;
    ev.preventDefault();
    const rect = tile.getBoundingClientRect();
    const offX = ev.clientX - rect.left, offY = ev.clientY - rect.top;

    document.body.appendChild(tile);
    tile.style.position = "fixed";
    tile.style.left = rect.left + "px";
    tile.style.top = rect.top + "px";
    tile.style.width = rect.width + "px";
    tile.style.height = rect.height + "px";
    tile.classList.add("dragging");
    tile.setPointerCapture(ev.pointerId);

    function move(e){
      tile.style.left = (e.clientX - offX) + "px";
      tile.style.top = (e.clientY - offY) + "px";
      dragPointerY = e.clientY;
      startAutoScroll();
    }
    function up(e){
      tile.removeEventListener("pointermove", move);
      tile.removeEventListener("pointerup", up);
      stopAutoScroll();
      tile.classList.remove("dragging");
      tile.style.visibility = "hidden";
      const under = document.elementFromPoint(e.clientX, e.clientY);
      tile.style.visibility = "visible";
      tile.style.position = ""; tile.style.left = ""; tile.style.top = ""; tile.style.width = ""; tile.style.height = "";

      const blank = under ? under.closest(".drop-blank") : null;

      if (blank){
        const existing = blank.querySelector(".letter-tag");
        if (existing && existing !== tile){
          const existingHome = homeCardOf(existing);
          if (existingHome) existingHome.appendChild(existing);
        }
        blank.appendChild(tile);
      } else {
        const home = homeCardOf(tile);
        if (home) home.appendChild(tile);
      }
      updateCheckBtn();
    }
    tile.addEventListener("pointermove", move);
    tile.addEventListener("pointerup", up);
  });
}

// ================== ตรวจคำตอบ (ตรวจครั้งเดียวหลังตอบครบทุกข้อ) ==================
function checkAnswers(){
  if (checkedRound) return;
  checkedRound = true;

  let correctCount = 0;
  document.querySelectorAll(".drop-blank").forEach(blank => {
    const tile = blank.querySelector(".letter-tag");
    const expected = blank.dataset.expected;
    if (tile && tile.dataset.letter === expected){
      blank.classList.add("correct");
      correctCount++;
    } else {
      blank.classList.add("wrong");
      const hint = document.createElement("span");
      hint.className = "correct-hint";
      hint.textContent = "ที่ถูกคือ " + expected;
      blank.parentElement.appendChild(hint);
    }
  });

  stars += correctCount;
  $("starCount").textContent = stars;
  playTone(correctCount === PER_ROUND);
  setFeedback(`ถูก ${correctCount}/${PER_ROUND} ข้อ ${correctCount === PER_ROUND ? "🎉" : ""}`, correctCount === PER_ROUND ? "good" : "info");

  $("checkBtn").disabled = true;
  $("checkBtn").classList.add("done");

  setTimeout(() => {
    if (roundIdx < TOTAL_ROUNDS) loadRound();
    else endGame();
  }, 2200);
}

// ================== เอฟเฟกต์เสียง ==================
let audioCtx = null;
function playTone(good){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const notes = good ? [523,659,784] : [330,262];
    notes.forEach((f,i)=>{
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.value = f; o.type = "sine";
      const t = audioCtx.currentTime + i*0.12;
      g.gain.setValueAtTime(0.15, t);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.25);
      o.start(t); o.stop(t+0.3);
    });
  }catch(e){}
}

// ================== Leaderboard ==================
function loadScores(){
  try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; }
  catch(e){ return []; }
}
function saveScore(name, score){
  const scores = loadScores();
  const entry = { name, score, ts: Date.now() };
  scores.push(entry);
  scores.sort((a,b)=> b.score - a.score || a.ts - b.ts);
  localStorage.setItem(LB_KEY, JSON.stringify(scores.slice(0,20)));
  return entry;
}
function renderBoard(myEntry){
  const scores = loadScores().slice(0,5);
  const tbody = $("boardBody");
  tbody.innerHTML = "";
  if (scores.length === 0){
    tbody.innerHTML = "<tr><td colspan='3'>ยังไม่มีคะแนน</td></tr>";
    return;
  }
  scores.forEach((s,i)=>{
    const tr = document.createElement("tr");
    if (i===0) tr.className = "rank1";
    if (myEntry && s.ts === myEntry.ts && s.name === myEntry.name) tr.classList.add("me");
    const medal = ["🥇","🥈","🥉"][i] || (i+1);
    tr.innerHTML = `<td>${medal}</td><td>${escapeHtml(s.name)}</td><td>⭐ ${s.score}</td>`;
    tbody.appendChild(tr);
  });
}
function escapeHtml(s){ const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

// ================== จบเกม ==================
function endGame(){
  $("finalStars").textContent = `${playerName} ได้ ⭐ ${stars} จาก ${TOTAL_ROUNDS*PER_ROUND} ดวง`;
  const entry = saveScore(playerName, stars);
  renderBoard(entry);
  showScreen("endScreen");
}

// ================== Events ==================
$("startBtn").onclick = () => {
  playTone(true);
  startGame();
};
$("checkBtn").onclick = checkAnswers;
$("againBtn").onclick = () => { showScreen("nameScreen"); };
