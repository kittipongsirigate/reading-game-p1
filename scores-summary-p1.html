<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>สรุปคะแนน ป.1 📊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body {
    font-family:'Sarabun','Prompt','Segoe UI',Tahoma,sans-serif;
    background: linear-gradient(160deg,#fff3b0 0%,#ffe1e6 50%,#c7e9ff 100%);
    min-height:100%;
    display:flex; flex-direction:column; align-items:center;
    padding:60px 16px 40px;
  }

  .home-btn {
    position:fixed; top:12px; left:14px; z-index:100;
    background:#fff; border-radius:20px; padding:8px 16px;
    font-size:clamp(14px,3.6vw,17px); font-weight:bold; color:#0f766e;
    box-shadow:0 3px 8px rgba(0,0,0,.15);
    text-decoration:none; display:flex; align-items:center; gap:6px;
  }
  .home-btn:active { transform:translateY(2px); }

  .capture-area {
    background:#fff; border-radius:32px; padding:32px 26px;
    width:100%; max-width:460px;
    box-shadow:0 10px 26px rgba(0,0,0,.15);
  }
  .mascot { font-size:clamp(54px,14vw,72px); text-align:center; }
  h1 { font-size:clamp(24px,6vw,32px); color:#9d174d; text-align:center; margin-top:4px; }
  .player-line { text-align:center; font-size:clamp(16px,4vw,20px); color:#334155; font-weight:bold; margin:8px 0 22px; }

  .game-row {
    display:flex; align-items:center; gap:14px;
    background:#f8fafc; border-radius:20px; padding:14px 16px;
    margin-bottom:12px;
  }
  .game-row .icon { font-size:clamp(30px,8vw,38px); flex:none; }
  .game-row .info { flex:1; text-align:left; }
  .game-row .name { font-weight:bold; font-size:clamp(15px,3.8vw,18px); color:#1e293b; }
  .game-row .score { font-size:clamp(14px,3.4vw,16px); color:#64748b; margin-top:2px; }
  .game-row .score.done { color:#15803d; font-weight:bold; }
  .game-row .score.none { color:#b91c1c; }
  .game-row a.play-link {
    flex:none; text-decoration:none; font-weight:bold; font-size:clamp(12px,3.2vw,14px);
    background:#fde68a; color:#7a3b00; padding:8px 12px; border-radius:14px;
  }

  .total-row {
    display:flex; justify-content:space-between; align-items:center;
    background:linear-gradient(180deg,#fde68a,#fbbf24); border-radius:20px;
    padding:16px 18px; margin-top:6px;
    font-weight:bold; font-size:clamp(17px,4.2vw,21px); color:#7a3b00;
  }

  .date-line { text-align:center; font-size:12px; color:#94a3b8; margin-top:14px; }

  .actions { display:flex; gap:14px; margin-top:24px; flex-wrap:wrap; justify-content:center; }
  .big-btn {
    border:none; border-radius:24px; cursor:pointer;
    font-family:inherit; font-weight:bold;
    box-shadow:0 5px 0 rgba(0,0,0,.18);
    transition:transform .1s, box-shadow .1s;
    touch-action:manipulation;
    font-size:clamp(16px,4vw,20px); padding:14px 26px;
  }
  .big-btn:active { transform:translateY(4px); box-shadow:0 1px 0 rgba(0,0,0,.18); }
  #saveBtn { background:linear-gradient(180deg,#86efac,#22c55e); color:#052e16; }
  .home-link-btn {
    background:#e2e8f0; color:#334155; text-decoration:none;
    display:inline-flex; align-items:center; justify-content:center;
  }

  .no-name {
    background:#fff; border-radius:24px; padding:30px 24px; text-align:center;
    max-width:380px; box-shadow:0 8px 20px rgba(0,0,0,.15);
  }
  .no-name a { display:inline-block; margin-top:16px; }
</style>
</head>
<body>

<a href="index.html" class="home-btn">🏠 หน้าหลัก</a>

<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const NAME_KEY = "p1_player_name";
const playerName = (localStorage.getItem(NAME_KEY) || "").trim();

const GAMES_INFO = [
  { title:"เกมอ่านออกเสียง",    icon:"🦉", lbKey:"reading_game_p1_scores",  max:10, file:"reading-game-p1.html" },
  { title:"เกมจับคู่คำ-รูปภาพ", icon:"🧩", lbKey:"matching_game_p1_scores", max:18, file:"matching-game-p1.html" },
  { title:"เกมเรียงประโยค",     icon:"📝", lbKey:"sentence_game_p1_scores", max:17, file:"sentence-game-p1.html" },
];
const FLUENCY_COMPLETE_KEY = "fluency_game_p1_completions";
const FLUENCY_INFO = { title:"เกมอ่านคล่อง", icon:"📖", file:"fluency-game-p1.html" };

function bestScoreFor(lbKey, name){
  try{
    const scores = JSON.parse(localStorage.getItem(lbKey)) || [];
    const mine = scores.filter(s => s.name === name);
    if (!mine.length) return null;
    return Math.max(...mine.map(s => s.score));
  }catch(e){ return null; }
}
function hasCompletedFluency(name){
  try{
    const list = JSON.parse(localStorage.getItem(FLUENCY_COMPLETE_KEY)) || [];
    return list.some(e => e.name === name);
  }catch(e){ return false; }
}

function render(){
  const root = document.getElementById("root");

  if (!playerName){
    root.innerHTML = `
      <div class="no-name">
        <div class="mascot">🤔</div>
        <h1 style="font-size:22px;margin-top:8px;">ยังไม่มีชื่อผู้เล่น</h1>
        <p style="color:#64748b;margin-top:8px;">กลับไปตั้งชื่อที่หน้าแรกก่อนนะ</p>
        <a class="big-btn" id="saveBtn" href="index.html" style="text-decoration:none;display:inline-flex;align-items:center;">🏠 ไปหน้าแรก</a>
      </div>`;
    return;
  }

  let totalStars = 0, totalMax = 0;
  const rows = GAMES_INFO.map(g => {
    const score = bestScoreFor(g.lbKey, playerName);
    if (score !== null){ totalStars += score; totalMax += g.max; }
    const scoreHtml = score !== null
      ? `<div class="score done">⭐ ${score} / ${g.max}</div>`
      : `<div class="score none">ยังไม่ได้เล่น</div>`;
    const linkHtml = score !== null
      ? `<a class="play-link" href="${g.file}">🔁 เล่นอีกครั้ง</a>`
      : `<a class="play-link" href="${g.file}">▶ เล่นเลย</a>`;
    return `
      <div class="game-row">
        <div class="icon">${g.icon}</div>
        <div class="info">
          <div class="name">${g.title}</div>
          ${scoreHtml}
        </div>
        ${linkHtml}
      </div>`;
  }).join("");

  const fluencyDone = hasCompletedFluency(playerName);
  const fluencyRow = `
    <div class="game-row">
      <div class="icon">${FLUENCY_INFO.icon}</div>
      <div class="info">
        <div class="name">${FLUENCY_INFO.title}</div>
        <div class="score ${fluencyDone ? "done" : "none"}">${fluencyDone ? "✅ อ่านจบแล้ว" : "ยังไม่ได้เล่น"}</div>
      </div>
      <a class="play-link" href="${FLUENCY_INFO.file}">${fluencyDone ? "🔁 อ่านอีกครั้ง" : "▶ เล่นเลย"}</a>
    </div>`;

  const today = new Date();
  const dateStr = `${today.getDate()}/${today.getMonth()+1}/${today.getFullYear()+543}`;

  root.innerHTML = `
    <div class="capture-area" id="captureArea">
      <div class="mascot">📊</div>
      <h1>สรุปคะแนน</h1>
      <div class="player-line">👧 ${playerName}</div>
      ${rows}
      ${fluencyRow}
      <div class="total-row">
        <span>⭐ รวมคะแนนทั้งหมด</span>
        <span>${totalStars} / ${totalMax}</span>
      </div>
      <div class="date-line">${dateStr}</div>
    </div>
    <div class="actions">
      <button class="big-btn" id="saveBtn">💾 บันทึกเป็นรูปภาพ</button>
      <a href="index.html" class="big-btn home-link-btn">🏠 กลับหน้าหลัก</a>
    </div>
  `;

  document.getElementById("saveBtn").onclick = () => {
    const el = document.getElementById("captureArea");
    html2canvas(el, { backgroundColor:"#ffffff", scale:2 }).then(canvas => {
      const link = document.createElement("a");
      link.download = `สรุปคะแนน-${playerName}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    });
  };
}
render();
</script>
</body>
</html>
