<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>เกมอ่านออกเสียง ป.1 🌟</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body {
    font-family:'Sarabun','Prompt','Segoe UI',Tahoma,sans-serif;
    background: linear-gradient(160deg,#a8e6ff 0%,#d8f7c9 50%,#fff3b0 100%);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; user-select:none; -webkit-user-select:none;
  }
  .screen {
    width:100%; max-width:520px; height:100%; max-height:820px;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    padding:54px 16px 16px; text-align:center; position:relative;
    overflow-y:auto;
  }
  .screen.active { display:flex; }
  #gameScreen { justify-content:flex-start; }

  .big-btn {
    border:none; border-radius:32px; cursor:pointer;
    font-family:inherit; font-weight:bold;
    box-shadow:0 6px 0 rgba(0,0,0,.18);
    transition:transform .1s, box-shadow .1s;
    touch-action:manipulation;
  }
  .big-btn:active { transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.18); }

  /* ---------- หน้าเริ่ม / ใส่ชื่อ ---------- */
  h1.title { font-size:clamp(30px,7vw,44px); color:#2d6a4f; margin-bottom:8px; text-shadow:2px 2px 0 #fff; }
  .mascot { font-size:clamp(70px,20vw,110px); animation:bounce 1.6s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }
  .subtitle { font-size:clamp(17px,4vw,21px); color:#40513b; margin:14px 0 26px; line-height:1.6; }
  .primary-btn {
    font-size:clamp(24px,6vw,32px); padding:20px 60px;
    background:linear-gradient(180deg,#ffd93d,#ff9f1c); color:#7a3b00;
  }
  .warn {
    margin-top:22px; font-size:15px; color:#9a3412; background:#fff7ed;
    border:2px dashed #fdba74; border-radius:16px; padding:10px 14px; display:none;
  }
  #nameInput {
    font-family:inherit; font-size:clamp(22px,5.5vw,28px); font-weight:bold;
    text-align:center; color:#1e293b;
    border:4px solid #60a5fa; border-radius:24px; outline:none;
    padding:14px 18px; width:min(80vw,320px); margin:10px 0 24px;
    background:#fff;
  }
  #nameInput:focus { border-color:#2563eb; }

  /* ---------- ปุ่มกลับหน้าหลัก ---------- */
  .home-btn {
    position:fixed; top:12px; left:14px; z-index:100;
    background:#fff; border-radius:20px; padding:8px 16px;
    font-size:clamp(14px,3.6vw,17px); font-weight:bold; color:#0f766e;
    box-shadow:0 3px 8px rgba(0,0,0,.15);
    text-decoration:none; display:flex; align-items:center; gap:6px;
  }
  .home-btn:active { transform:translateY(2px); }

  /* ---------- หน้าเกม ---------- */
  .topbar {
    width:100%; flex:none;
    display:flex; justify-content:space-between; align-items:center; padding:0 4px;
    margin-bottom:8px;
  }
  .stars-box {
    background:#fff; border-radius:24px; padding:6px 16px;
    font-size:clamp(19px,4.5vw,24px); font-weight:bold; color:#b45309;
    box-shadow:0 3px 8px rgba(0,0,0,.12);
  }
  .progress-text {
    background:#fff; border-radius:24px; padding:6px 16px;
    font-size:clamp(16px,4vw,20px); font-weight:bold; color:#1d4ed8;
    box-shadow:0 3px 8px rgba(0,0,0,.12);
  }
  .player-tag {
    width:100%; flex:none; text-align:center; margin-bottom:8px;
    font-size:clamp(15px,3.8vw,18px); font-weight:bold; color:#0f766e;
  }
  .progress-bar { width:100%; max-width:min(92vw,440px); flex:none; height:14px; background:#ffffffaa; border-radius:10px; overflow:hidden; margin-bottom:26px; }
  .progress-fill { height:100%; width:0%; background:linear-gradient(90deg,#34d399,#10b981); border-radius:10px; transition:width .4s; }

  .word-card {
    background:#fff; border-radius:36px; padding:40px 30px;
    box-shadow:0 6px 16px rgba(0,0,0,.12);
    width:min(92vw,440px); margin-bottom:18px; margin-top:2px;
    display:flex; align-items:center; justify-content:center; min-height:170px;
  }
  .word-text { font-size:clamp(56px,15vw,88px); font-weight:bold; color:#1e293b; line-height:1.3; }

  .btn-row { display:flex; gap:14px; margin-top:6px; flex-wrap:wrap; justify-content:center; }
  #listenBtn { font-size:clamp(19px,4.5vw,24px); padding:14px 24px; background:#60a5fa; color:#fff; }
  #micBtn {
    font-size:clamp(22px,5.5vw,28px); padding:18px 34px;
    background:linear-gradient(180deg,#f87171,#ef4444); color:#fff;
  }
  #micBtn.listening { animation:pulse 1s infinite; background:linear-gradient(180deg,#4ade80,#22c55e); }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  #skipBtn { font-size:clamp(15px,3.8vw,18px); padding:10px 20px; background:#e2e8f0; color:#475569; margin-top:14px; }

  .mic-info { width:min(92vw,440px); margin-top:10px; }
  .mic-level-box {
    width:100%; height:16px; background:#e2e8f0; border-radius:10px;
    overflow:hidden; box-shadow:inset 0 1px 4px rgba(0,0,0,.18);
  }
  .mic-level-fill {
    height:100%; width:0%; border-radius:10px;
    background:linear-gradient(90deg,#34d399,#facc15,#ef4444);
    transition:width .07s linear;
  }
  .mic-device {
    font-size:clamp(12px,3.2vw,14px); color:#64748b; margin-top:5px;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .mic-dot { width:9px; height:9px; border-radius:50%; background:#cbd5e1; flex:none; }
  .mic-dot.on { background:#22c55e; box-shadow:0 0 0 3px rgba(34,197,94,.25); }
  .mic-select {
    margin-top:8px; width:100%; font-size:clamp(12px,3.2vw,14px);
    padding:8px 10px; border-radius:12px; border:1px solid #cbd5e1;
    background:#fff; color:#334155; font-family:inherit;
  }
  .mic-hint { font-size:clamp(11px,3vw,13px); color:#94a3b8; margin-top:4px; line-height:1.5; }

  .feedback {
    min-height:64px; margin-top:14px; font-size:clamp(20px,5vw,26px);
    font-weight:bold; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .feedback.good { color:#15803d; animation:pop .4s; }
  .feedback.bad  { color:#b91c1c; animation:shake .4s; }
  .feedback.info { color:#1d4ed8; }
  @keyframes pop { 0%{transform:scale(.5)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

  .heard { font-size:clamp(14px,3.6vw,17px); color:#64748b; min-height:22px; }

  .manual-row { display:none; gap:16px; margin-top:12px; }
  .manual-row button { font-size:clamp(18px,4.5vw,22px); padding:12px 28px; }
  #manualOk { background:#4ade80; color:#14532d; }
  #manualNo { background:#fca5a5; color:#7f1d1d; }

  /* ---------- หน้าจบ + Leaderboard ---------- */
  #endScreen h1 { font-size:clamp(28px,6.5vw,40px); color:#b45309; text-shadow:2px 2px 0 #fff; }
  #endScreen .trophy { font-size:clamp(60px,16vw,90px); animation:bounce 1.6s infinite; }
  #finalStars { font-size:clamp(20px,5vw,26px); color:#1e293b; margin:10px 0 14px; font-weight:bold; }
  #againBtn { font-size:clamp(20px,5vw,26px); padding:16px 44px; background:linear-gradient(180deg,#a78bfa,#8b5cf6); color:#fff; margin-top:16px; }

  .board {
    background:#fff; border-radius:24px; padding:14px 18px;
    width:min(92vw,400px); box-shadow:0 8px 20px rgba(0,0,0,.15);
    max-height:38vh; overflow-y:auto;
  }
  .board h2 { font-size:clamp(18px,4.5vw,22px); color:#7c2d12; margin-bottom:8px; }
  .board table { width:100%; border-collapse:collapse; }
  .board td, .board th {
    padding:6px 4px; font-size:clamp(15px,4vw,19px); color:#334155;
    border-bottom:1px solid #f1f5f9; text-align:center;
  }
  .board th { color:#94a3b8; font-size:clamp(13px,3.4vw,15px); }
  .board tr.me { background:#fef9c3; font-weight:bold; border-radius:8px; }
  .board .rank1 td { color:#b45309; font-weight:bold; }

  .fly-star { position:fixed; font-size:44px; pointer-events:none; animation:fly 1s ease-out forwards; z-index:99; }
  @keyframes fly { 0%{transform:translateY(0) scale(1); opacity:1} 100%{transform:translateY(-140px) scale(1.6); opacity:0} }
</style>
</head>
<body>

<a href="index.html" class="home-btn">🏠 หน้าหลัก</a>

<!-- หน้าใส่ชื่อ (หน้าแรก) -->
<div class="screen active" id="nameScreen">
  <div class="mascot">🦉</div>
  <h1 class="title">เกมอ่านออกเสียง</h1>
  <p class="subtitle">คำ 2 พยางค์ ชั้น ป.1<br>อ่านให้ถูก รับดาวสะสม ⭐</p>
  <input id="nameInput" type="text" maxlength="15" placeholder="พิมพ์ชื่อของหนู..." autocomplete="off">
  <button class="big-btn primary-btn" id="startBtn">▶ เริ่มเล่น</button>
  <div class="warn" id="warnBox">
    ⚠️ เบราว์เซอร์นี้ไม่รองรับการฟังเสียง<br>
    แนะนำ Chrome (PC/Android) หรือ Safari (iPhone/iPad)<br>
    ยังเล่นได้โดยให้คุณครูกดปุ่ม ✓ / ✗ ตรวจเอง
  </div>
</div>

<!-- หน้าเล่นเกม -->
<div class="screen" id="gameScreen">
  <div class="topbar">
    <div class="progress-text" id="progressText">ข้อ 1/10</div>
    <div class="stars-box">⭐ <span id="starCount">0</span></div>
  </div>
  <div class="player-tag" id="playerTag">👧 น้อง...</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="word-card">
    <div class="word-text" id="wordText">ดินสอ</div>
  </div>

  <div class="btn-row">
    <button class="big-btn" id="listenBtn">🔊 ฟังตัวอย่าง</button>
    <button class="big-btn" id="micBtn">🎤 พูดเลย!</button>
  </div>

  <div class="manual-row" id="manualRow">
    <button class="big-btn" id="manualOk">✓ อ่านถูก</button>
    <button class="big-btn" id="manualNo">✗ ยังไม่ถูก</button>
  </div>

  <div class="feedback" id="feedback"></div>
  <div class="heard" id="heardText"></div>

  <div class="mic-info" id="micInfo">
    <div class="mic-level-box"><div class="mic-level-fill" id="micLevelFill"></div></div>
    <div class="mic-device" id="micDeviceText"><span class="mic-dot" id="micDot"></span><span id="micDeviceLabel">ยังไม่ได้เปิดไมค์</span></div>
    <select class="mic-select" id="micSelect"><option>กำลังค้นหาไมค์...</option></select>
    <div class="mic-hint" id="micHint"></div>
  </div>

  <button class="big-btn" id="skipBtn">ข้ามคำนี้ ⏭</button>
</div>

<!-- หน้าจบเกม + Leaderboard -->
<div class="screen" id="endScreen">
  <div class="trophy">🏆</div>
  <h1>เก่งมาก!</h1>
  <div id="finalStars"></div>
  <div class="board">
    <h2>🏅 คะแนนสูงสุด</h2>
    <table>
      <thead><tr><th>ที่</th><th>ชื่อ</th><th>ดาว</th></tr></thead>
      <tbody id="boardBody"></tbody>
    </table>
  </div>
  <button class="big-btn" id="againBtn">🔄 เล่นอีกครั้ง</button>
</div>

<script>
// ================== คำ 2 พยางค์ ป.1 (คลังคำ 100 คำ แบ่งเป็น 10 ชุด ชุดละ 10 คำ) ==================
// แต่ละรอบเกมจะสุ่มหยิบ "ทั้งชุด" มาเล่น โดยจะไม่เล่นซ้ำชุดเดิมจนกว่าจะครบทั้ง 10 ชุด (สุ่มแบบวนครบทุกชุดก่อนเริ่มรอบใหม่)
const WORD_SETS = [
  [ // ชุดที่ 1
    { w:"ดินสอ",    alt:["ดินสอร์"] },
    { w:"กระดาษ",   alt:["กระดาด"] },
    { w:"ดอกไม้",   alt:["ดอกไม","ดอกไหม้"] },
    { w:"ต้นไม้",   alt:["ตนไม้","ต้นไม"] },
    { w:"หนังสือ",  alt:["นังสือ","หนังสื่อ"] },
    { w:"โรงเรียน", alt:["โรงเรียง"] },
    { w:"มะม่วง",   alt:["มะมวง"] },
    { w:"ผีเสื้อ",  alt:["ผีเสื่อ","พี่เสื้อ"] },
    { w:"จมูก",     alt:["จะมูก","จมุก"] },
    { w:"กระต่าย",  alt:["กระตาย"] },
  ],
  [ // ชุดที่ 2
    { w:"รองเท้า",  alt:["รองเทา"] },
    { w:"กระเป๋า",  alt:["กระเป่า"] },
    { w:"แตงโม",    alt:["แตงโม่"] },
    { w:"ส้มโอ",    alt:["สมโอ"] },
    { w:"มะนาว",    alt:["มานาว"] },
    { w:"ไก่ย่าง",  alt:["ไก่ยาง"] },
    { w:"ปลาทู",    alt:["ปลาทู่"] },
    { w:"หมูทอด",   alt:["หมูทอต"] },
    { w:"น้ำแข็ง",  alt:["น้ำแขง"] },
    { w:"เสื้อผ้า", alt:["เสื่อผ้า","เสื้อผา"] },
  ],
  [ // ชุดที่ 3
    { w:"กางเกง",   alt:["กางเก็ง"] },
    { w:"ถุงเท้า",  alt:["ถุงเทา"] },
    { w:"แว่นตา",   alt:["แวนตา"] },
    { w:"กระจก",    alt:["กระจอก"] },
    { w:"กระโดด",   alt:["กระโดต"] },
    { w:"กระรอก",   alt:["กระหรอก"] },
    { w:"ลูกแมว",   alt:["ลูกแมว่"] },
    { w:"ลูกหมา",   alt:["ลูกมา"] },
    { w:"หอยทาก",   alt:["หอยทาก์"] },
    { w:"ปลาดาว",   alt:["ปลาดาว์"] },
  ],
  [ // ชุดที่ 4
    { w:"เต่าทอง",  alt:["เต่าทอง์"] },
    { w:"นกแก้ว",   alt:["นกแกว"] },
    { w:"นกฮูก",    alt:["นกฮุก"] },
    { w:"มดแดง",    alt:["มดแดง์"] },
    { w:"งูเห่า",   alt:["งูเหา"] },
    { w:"เสือดาว",  alt:["เสือดาว์"] },
    { w:"ม้าลาย",   alt:["มาลาย"] },
    { w:"ยีราฟ",    alt:["ยีราบ"] },
    { w:"สิงโต",    alt:["สิงโตะ"] },
    { w:"ปลาวาฬ",   alt:["ปลาวาน"] },
  ],
  [ // ชุดที่ 5
    { w:"ลูกโป่ง",  alt:["ลูกโปง"] },
    { w:"ปลาไหล",  alt:["ปลาไหล่"] },
    { w:"ปลาหมึก", alt:["ปลาหมึก์"] },
    { w:"ลูกช้าง",  alt:["ลูกชาง"] },
    { w:"หมูป่า",   alt:["หมูปา"] },
    { w:"แมวน้ำ",   alt:["แมวนำ"] },
    { w:"หมาป่า",   alt:["หมาปา"] },
    { w:"นกยูง",    alt:["นกยุง"] },
    { w:"เป็ดยาง",  alt:["เป็ดยาง์"] },
    { w:"ปลากัด",   alt:["ปลากัต"] },
  ],
  [ // ชุดที่ 6
    { w:"ปลาช่อน",  alt:["ปลาชอน"] },
    { w:"งูเขียว",  alt:["งูเขียว์"] },
    { w:"แมงมุม",   alt:["แมงมุม์"] },
    { w:"หิ่งห้อย", alt:["หิ่งห้อย์"] },
    { w:"จิ้งจก",   alt:["จิ้งจก์"] },
    { w:"ไส้เดือน",  alt:["ไส้เดือน์"] },
    { w:"ใบไม้",    alt:["ใบไม"] },
    { w:"กิ่งไม้",  alt:["กิ่งไม"] },
    { w:"ข้าวโพด",  alt:["ข้าวโพต"] },
    { w:"ข้าวเหนียว",alt:["ข้าวเหนียว์"] },
  ],
  [ // ชุดที่ 7
    { w:"น้ำตาล",   alt:["น้ำตาน"] },
    { w:"น้ำปลา",   alt:["น้ำปลา์"] },
    { w:"น้ำส้ม",   alt:["น้ำสม"] },
    { w:"น้ำผึ้ง",  alt:["น้ำผึง"] },
    { w:"ไข่ดาว",   alt:["ไข่ดาว์"] },

    { w:"ข้าวต้ม",  alt:["ข้าวตม"] },
    { w:"ผัดไทย",   alt:["ผัดไท"] },
  ],
  [ // ชุดที่ 8
    { w:"ต้มยำ",    alt:["ตมยำ"] },
    { w:"แกงจืด",   alt:["แกงจืด์"] },
    { w:"หมูปิ้ง",  alt:["หมูปิง"] },
    { w:"ไก่ทอด",   alt:["ไก่ทอต"] },

    { w:"ลูกกวาด",  alt:["ลูกกวาต"] },

  ],
  [ // ชุดที่ 9
    { w:"เก้าอี้",  alt:["เก้าอี"] },
    { w:"โต๊ะเรียน",alt:["โตะเรียน"] },
    { w:"ประตู",    alt:["ประตู์"] },
    { w:"หน้าต่าง", alt:["หน้าตาง"] },
    { w:"เตียงนอน", alt:["เตียงนอน์"] },
    { w:"ผ้าห่ม",   alt:["ผ้าหม"] },
    { w:"รถไฟ",     alt:["รดไฟ"] },
    { w:"รถเมล์",   alt:["รดเมล์"] },
    { w:"เรือใบ",   alt:["เรือใบ์"] },
    { w:"เครื่องบิน",alt:["เครื่องบิน์"] },
  ],
  [ // ชุดที่ 10
    { w:"กระดิ่ง",  alt:["กระดิง"] },
    { w:"ลูกข่าง",  alt:["ลูกขาง"] },
    { w:"ลูกบอล",   alt:["ลูกบอล์"] },
    { w:"ฝนตก",     alt:["ฝนตก์"] },
    { w:"ลมแรง",    alt:["ลมแรง์"] },
    { w:"ฟ้าร้อง",  alt:["ฟ้าร้อง์"] },
    { w:"สายรุ้ง",  alt:["สายรุ้ง์"] },
    { w:"ดาวตก",    alt:["ดาวตก์"] },
    { w:"ดวงจันทร์",alt:["ดวงจัน"] },
    { w:"ดวงดาว",   alt:["ดวงดาว์"] },
  ],
];

// สุ่ม "ลำดับชุด" แบบวนครบทุกชุดก่อนเริ่มสุ่มรอบใหม่ (กันไม่ให้ชุดซ้ำติดกัน)
let setOrder = [], setPointer = 0;
function pickNextSet(){
  if (setPointer >= setOrder.length){
    setOrder = shuffle(WORD_SETS.map((_, i) => i));
    setPointer = 0;
  }
  return WORD_SETS[setOrder[setPointer++]];
}

const PRAISE  = ["เก่งมาก! 🎉","ยอดเยี่ยม! 👏","สุดยอดเลย! 🌟","อ่านถูกต้อง! 💯","เยี่ยมไปเลย! 🥳"];
const TRY_AGAIN = ["ลองอีกครั้งนะ 💪","เกือบถูกแล้ว ลองใหม่! 😊","สู้ๆ ลองพูดอีกที 🌈"];
const LB_KEY = "reading_game_p1_scores";

// ================== ตัวแปรเกม ==================
let order = [], idx = 0, stars = 0, tries = 0;
let playerName = "";
let recognizing = false, recognition = null;
let micReady = false;

const $ = id => document.getElementById(id);
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const hasSR = !!SR;
// Chrome (ทั้งบนมือถือและพีซี): ถ้ามีสตรีมไมค์ (getUserMedia) ค้างไว้พร้อมกับ SpeechRecognition กำลังทำงาน
// เอนจิน speech ของ Chrome จะแย่งไมค์กันเองจนจับคำพูดไม่ได้เลย (แม้หลอดระดับเสียงจะขึ้นก็ตาม)
// ทดสอบแล้วพบว่าเกิดเฉพาะ Chrome เท่านั้น — Edge (เอนจิน speech คนละตัว) และ iOS Safari ไม่มีปัญหานี้
const ua = navigator.userAgent;
const isChrome = /Chrome/.test(ua) && !/Edg\//.test(ua) && !/OPR\//.test(ua);

// ================== เสียงพูดตัวอย่าง (TTS) ==================
function speak(text, cb){
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "th-TH"; u.rate = 0.8;
    const v = speechSynthesis.getVoices().find(v => v.lang && v.lang.startsWith("th"));
    if (v) u.voice = v;
    if (cb) u.onend = cb;
    speechSynthesis.speak(u);
  }catch(e){ if(cb) cb(); }
}
if ('speechSynthesis' in window) speechSynthesis.getVoices();

// ================== ขออนุญาตไมค์ล่วงหน้า (แก้บั๊ก popup ตัดจังหวะ) ==================
// ขอสิทธิ์ไมค์ด้วย getUserMedia ก่อน 1 ครั้ง เพื่อให้ตอนกด 🎤
// SpeechRecognition เริ่มฟังได้ทันที ไม่โดน popup ขัดจนหลุด loop
// สตรีมนี้ยังถูกเก็บไว้ (ไม่ stop) เพื่อใช้แสดงระดับเสียง + ชื่ออุปกรณ์ไมค์แบบเรียลไทม์
let micStream = null, audioCtx = null, analyser = null, micDataArray = null, micRafId = null;

async function ensureMic(){
  if (micReady) return true;
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return true; // ให้ SR จัดการเอง
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    micStream = stream;
    micReady = true;
    setupMicMonitor(stream);
    return true;
  } catch(e){
    return false;
  }
}

// ---------- แสดงระดับเสียงไมค์ + ชื่ออุปกรณ์ที่กำลังใช้งาน ----------
function setupMicMonitor(stream){
  try {
    if (micRafId){ cancelAnimationFrame(micRafId); micRafId = null; }
    analyser = null;
    const track = stream.getAudioTracks()[0];
    updateDeviceLabel(track);
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.55;
    source.connect(analyser); // ไม่ต่อไป destination กันเสียงสะท้อน
    micDataArray = new Uint8Array(analyser.fftSize);
    $("micDot").classList.add("on");
    startVisualizer();
    populateMicSelect();
  } catch(e){}
}

async function updateDeviceLabel(track){
  let label = track && track.label;
  if (!label && navigator.mediaDevices.enumerateDevices){
    try{
      const devices = await navigator.mediaDevices.enumerateDevices();
      const settings = (track && track.getSettings) ? track.getSettings() : {};
      const match = devices.find(d => d.kind === "audioinput" && d.deviceId === settings.deviceId);
      if (match) label = match.label;
    }catch(e){}
  }
  $("micDeviceLabel").textContent = label || "ไมโครโฟนพร้อมใช้งาน";
}

// ---------- เลือกเปลี่ยนอุปกรณ์ไมค์ ----------
async function populateMicSelect(){
  if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) return;
  try{
    const devices = await navigator.mediaDevices.enumerateDevices();
    const mics = devices.filter(d => d.kind === "audioinput");
    const sel = $("micSelect");
    const currentId = micStream && micStream.getAudioTracks()[0].getSettings().deviceId;
    sel.innerHTML = "";
    mics.forEach((d,i) => {
      const opt = document.createElement("option");
      opt.value = d.deviceId;
      opt.textContent = d.label || ("ไมโครโฟน " + (i+1));
      if (d.deviceId === currentId) opt.selected = true;
      sel.appendChild(opt);
    });
    if (mics.length === 0){
      sel.innerHTML = "<option>ไม่พบไมโครโฟน</option>";
    }
    $("micHint").textContent = "หมายเหตุ: แถบระดับเสียงจะใช้ไมค์ที่เลือกนี้ แต่การจับคำพูดจริงยังใช้ไมค์เริ่มต้นของเบราว์เซอร์/ระบบ ถ้าไม่ตรงกัน ให้ตั้งไมค์นี้เป็นค่าเริ่มต้นในระบบด้วย";
  }catch(e){}
}

async function switchMicDevice(deviceId){
  try{
    if (micStream) micStream.getTracks().forEach(t => t.stop());
    if (micRafId){ cancelAnimationFrame(micRafId); micRafId = null; }
    analyser = null;
    const stream = await navigator.mediaDevices.getUserMedia({ audio:{ deviceId:{ exact: deviceId } } });
    micStream = stream;
    setupMicMonitor(stream);
  }catch(e){
    $("micHint").textContent = "สลับไมค์ไม่สำเร็จ ลองใหม่อีกครั้ง";
  }
}
if (navigator.mediaDevices && navigator.mediaDevices.addEventListener){
  navigator.mediaDevices.addEventListener("devicechange", () => { if (micReady) populateMicSelect(); });
}

// ปล่อยสตรีมไมค์ของหลอดระดับเสียงทิ้งชั่วคราว (เฉพาะ Android) ก่อนเริ่ม SpeechRecognition
// เพื่อไม่ให้แย่งไมค์กัน แล้วค่อยขอกลับคืนมาหลังฟังจบ
function releaseMicMonitor(){
  if (micRafId){ cancelAnimationFrame(micRafId); micRafId = null; }
  analyser = null;
  if (micStream){
    micStream.getTracks().forEach(t => t.stop());
    micStream = null;
  }
  micReady = false;
  const dot = $("micDot");
  if (dot) dot.classList.remove("on");
  const fill = $("micLevelFill");
  if (fill) fill.style.width = "0%";
}

function startVisualizer(){
  if (micRafId) return;
  const fill = $("micLevelFill");
  function tick(){
    if (!analyser){ micRafId = null; return; }
    analyser.getByteTimeDomainData(micDataArray);
    let sum = 0;
    for (let i=0;i<micDataArray.length;i++){
      const v = (micDataArray[i]-128)/128;
      sum += v*v;
    }
    const rms = Math.sqrt(sum/micDataArray.length);
    const pct = Math.min(100, Math.round(rms*350)); // ขยายสเกลให้เห็นชัด
    fill.style.width = pct + "%";
    micRafId = requestAnimationFrame(tick);
  }
  micRafId = requestAnimationFrame(tick);
}

// ================== เริ่มเกม ==================
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function startGame(){
  order = shuffle([...pickNextSet()]);
  idx = 0; stars = 0;
  $("starCount").textContent = 0;
  $("playerTag").textContent = "👧 " + playerName;
  showScreen("gameScreen");
  loadWord();
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(id).classList.add("active");
}

function loadWord(){
  if (idx >= order.length) return endGame();
  tries = 0;
  $("wordText").textContent  = order[idx].w;
  $("progressText").textContent = `ข้อ ${idx+1}/${order.length}`;
  $("progressFill").style.width = (idx/order.length*100) + "%";
  setFeedback("", "");
  $("heardText").textContent = "";
  $("micBtn").disabled = false;
}

function setFeedback(msg, cls){
  const f = $("feedback");
  f.textContent = msg; f.className = "feedback " + cls;
}

// ================== ตรวจคำตอบ ==================
function normalize(s){ return (s||"").replace(/[\s​]/g,"").toLowerCase(); }

function isCorrect(transcripts){
  const item = order[idx];
  const targets = [item.w, ...item.alt].map(normalize);
  return transcripts.some(t => {
    const n = normalize(t);
    return targets.some(tg => n === tg || n.includes(tg));
  });
}

function stopListening(){
  try{ if (recognition) recognition.stop(); }catch(e){}
}

function correct(){
  stars++; tries = 0;
  $("starCount").textContent = stars;
  setFeedback(PRAISE[Math.floor(Math.random()*PRAISE.length)], "good");
  flyStar();
  playTone(true);
  stopListening();
  $("micBtn").disabled = true;
  setTimeout(()=>{ idx++; loadWord(); }, 1400);
}

function wrong(heard){
  tries++;
  playTone(false);
  if (heard) $("heardText").textContent = "ได้ยินว่า: “" + heard + "”";
  if (tries >= 3){
    stopListening();
    setFeedback("ไม่เป็นไรนะ 😊 คำนี้อ่านว่า...", "info");
    speak(order[idx].w, ()=> setTimeout(()=>{ idx++; loadWord(); }, 800));
  } else {
    setFeedback(TRY_AGAIN[Math.floor(Math.random()*TRY_AGAIN.length)], "bad");
    // ใช้ recognition.continuous=true ทำให้ไมค์ยังฟังต่อเนื่องอัตโนมัติ
    // ไม่ต้องกดปุ่มพูดใหม่ (เดิมพยายาม setTimeout เรียก startListening() ใหม่
    // แต่ iOS Safari บล็อกการ start() ที่ไม่ได้มาจาก user gesture โดยตรง)
  }
}

// ================== ฟังเสียงเด็ก (Speech Recognition) ==================
async function onMicPress(){
  if (recognizing) return;
  const ok = await ensureMic();
  if (!ok){
    setFeedback("กรุณาอนุญาตใช้ไมโครโฟน 🎤", "info");
    showManual();
    return;
  }
  startListening();
}

function startListening(){
  if (!hasSR || recognizing) return;
  // Chrome: ปล่อยไมค์ของหลอดระดับเสียงก่อน ไม่งั้น SpeechRecognition จะไม่ได้ยินเสียงเลย
  if (isChrome) releaseMicMonitor();
  recognition = new SR();
  recognition.lang = "th-TH";
  recognition.interimResults = true;   // ให้แสดงข้อความที่ตรวจจับได้แบบสดๆ ระหว่างพูด
  recognition.continuous = true;       // ฟังต่อเนื่องหลายครั้งในเซสชันเดียว (ตอบผิดแล้วพูดใหม่ได้ทันทีโดยไม่ต้องกดปุ่ม)
  recognition.maxAlternatives = 5;
  recognizing = true;
  const startedAt = Date.now();
  $("micBtn").classList.add("listening");
  $("micBtn").textContent = "🎤 กำลังฟัง...";
  setFeedback("พูดเลย! 🗣️", "info");
  $("heardText").textContent = "";

  let gotResult = false, restarted = false;
  recognition.onresult = ev => {
    let finalRes = null, interimText = "";
    for (let i = ev.resultIndex; i < ev.results.length; i++){
      const res = ev.results[i];
      if (res.isFinal) finalRes = res;
      else interimText += res[0].transcript;
    }
    if (interimText) $("heardText").textContent = "🗯️ กำลังได้ยิน: " + interimText;
    if (finalRes){
      gotResult = true;
      const alts = [];
      for (let i=0; i<finalRes.length; i++) alts.push(finalRes[i].transcript);
      if (isCorrect(alts)) { $("heardText").textContent = ""; correct(); }
      else wrong(alts[0]);
    }
  };
  recognition.onerror = ev => {
    gotResult = true;
    if (ev.error === "not-allowed" || ev.error === "service-not-allowed"){
      setFeedback("กรุณาอนุญาตใช้ไมโครโฟน 🎤", "info");
      showManual();
    } else if (ev.error === "no-speech"){
      setFeedback("ไม่ได้ยินเสียงเลย ลองใหม่นะ 🙉", "bad");
    } else if (ev.error === "aborted"){
      gotResult = false; // ให้ onend ลองเริ่มใหม่
    } else {
      setFeedback("ลองกดปุ่มไมค์อีกครั้งนะ", "info");
    }
  };
  recognition.onend = () => {
    recognizing = false;
    // ถ้าโดนตัดจบเร็วผิดปกติ (เช่น popup ขอสิทธิ์เพิ่งปิด) ให้เริ่มฟังใหม่เองอัตโนมัติ 1 ครั้ง
    if (!gotResult && !restarted && Date.now() - startedAt < 1500){
      restarted = true;
      setTimeout(startListening, 300);
      return;
    }
    $("micBtn").classList.remove("listening");
    $("micBtn").textContent = "🎤 พูดเลย!";
    if (!gotResult) setFeedback("ไม่ได้ยินเสียง ลองใหม่นะ 🙉", "bad");
    // Chrome: ฟังจบแล้ว ขอไมค์คืนมาให้หลอดระดับเสียงทำงานต่อ
    if (isChrome) ensureMic();
  };
  try { recognition.start(); }
  catch(e){ recognizing = false; }
}

function showManual(){
  $("manualRow").style.display = "flex";
  $("micBtn").style.display = "none";
}

// ================== Leaderboard ==================
function loadScores(){
  try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; }
  catch(e){ return []; }
}
function saveScore(name, score){
  const scores = loadScores();
  const entry = { name, score, ts: Date.now() };
  scores.push(entry);
  scores.sort((a,b)=> b.score - a.score || a.ts - b.ts);
  localStorage.setItem(LB_KEY, JSON.stringify(scores.slice(0,20)));
  return entry;
}
function renderBoard(myEntry){
  const scores = loadScores().slice(0,10);
  const tbody = $("boardBody");
  tbody.innerHTML = "";
  if (scores.length === 0){
    tbody.innerHTML = "<tr><td colspan='3'>ยังไม่มีคะแนน</td></tr>";
    return;
  }
  scores.forEach((s,i)=>{
    const tr = document.createElement("tr");
    if (i===0) tr.className = "rank1";
    if (myEntry && s.ts === myEntry.ts && s.name === myEntry.name) tr.classList.add("me");
    const medal = ["🥇","🥈","🥉"][i] || (i+1);
    tr.innerHTML = `<td>${medal}</td><td>${escapeHtml(s.name)}</td><td>⭐ ${s.score}</td>`;
    tbody.appendChild(tr);
  });
}
function escapeHtml(s){ const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

// ================== เอฟเฟกต์ ==================
function flyStar(){
  for (let i=0;i<3;i++){
    const s = document.createElement("div");
    s.className = "fly-star"; s.textContent = "⭐";
    s.style.left = (35 + Math.random()*30) + "%";
    s.style.top  = "50%";
    s.style.animationDelay = (i*0.12)+"s";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 1400);
  }
}

function playTone(good){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const notes = good ? [523,659,784] : [330,262];
    notes.forEach((f,i)=>{
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.value = f; o.type = "sine";
      const t = audioCtx.currentTime + i*0.12;
      g.gain.setValueAtTime(0.15, t);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.25);
      o.start(t); o.stop(t+0.3);
    });
  }catch(e){}
}

// ================== จบเกม ==================
function endGame(){
  $("progressFill").style.width = "100%";
  $("finalStars").textContent = `${playerName} ได้ ⭐ ${stars} จาก ${order.length} ดวง`;
  const entry = saveScore(playerName, stars);
  renderBoard(entry);
  showScreen("endScreen");
  speak(stars >= order.length*0.7 ? "เก่งมากๆเลย" : "เก่งมาก ครั้งหน้าลองใหม่นะ");
}

// ================== Events ==================
$("startBtn").onclick = async () => {
  const name = $("nameInput").value.trim();
  if (!name){
    $("nameInput").placeholder = "ใส่ชื่อก่อนนะ 😊";
    $("nameInput").focus();
    return;
  }
  playerName = name;
  playTone(true);           // ปลดล็อกเสียงบน iOS
  speechSynthesis.cancel(); // ปลดล็อก TTS
  if (hasSR) ensureMic();   // ขอสิทธิ์ไมค์ตั้งแต่ตอนเริ่ม จะได้ไม่มี popup ตัดจังหวะตอนพูด
  else showManual();
  startGame();
};
$("nameInput").addEventListener("keydown", e => { if (e.key === "Enter") $("startBtn").click(); });
$("listenBtn").onclick = () => speak(order[idx].w);
$("micBtn").onclick    = onMicPress;
$("skipBtn").onclick   = () => { idx++; loadWord(); };
$("micSelect").onchange = e => switchMicDevice(e.target.value);
$("manualOk").onclick  = correct;
$("manualNo").onclick  = () => wrong("");
$("againBtn").onclick  = () => {
  $("nameInput").value = "";
  showScreen("nameScreen");
  $("nameInput").focus();
};

if (!hasSR){ $("warnBox").style.display = "block"; }
</script>
