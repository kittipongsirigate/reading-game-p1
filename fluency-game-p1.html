<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>เกมอ่านคล่อง ป.1 📖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body {
    font-family:'Sarabun','Prompt','Segoe UI',Tahoma,sans-serif;
    background: linear-gradient(160deg,#a8e6ff 0%,#d8f7c9 50%,#fff3b0 100%);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; user-select:none; -webkit-user-select:none;
  }
  .screen {
    width:100%; max-width:520px; height:100%; max-height:820px;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    padding:54px 16px 16px; text-align:center; position:relative;
    overflow-y:auto;
  }
  .screen.active { display:flex; }
  #gameScreen { justify-content:flex-start; }

  .big-btn {
    border:none; border-radius:32px; cursor:pointer;
    font-family:inherit; font-weight:bold;
    box-shadow:0 6px 0 rgba(0,0,0,.18);
    transition:transform .1s, box-shadow .1s;
    touch-action:manipulation;
  }
  .big-btn:active { transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.18); }
  .big-btn:disabled { opacity:.45; cursor:default; box-shadow:0 6px 0 rgba(0,0,0,.1); }
  .big-btn:disabled:active { transform:none; }

  /* ---------- หน้าเริ่ม ---------- */
  h1.title { font-size:clamp(30px,7vw,44px); color:#2d6a4f; margin-bottom:8px; text-shadow:2px 2px 0 #fff; }
  .mascot { font-size:clamp(70px,20vw,110px); animation:bounce 1.6s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }
  .subtitle { font-size:clamp(17px,4vw,21px); color:#40513b; margin:14px 0 26px; line-height:1.6; }
  .primary-btn {
    font-size:clamp(24px,6vw,32px); padding:20px 60px;
    background:linear-gradient(180deg,#ffd93d,#ff9f1c); color:#7a3b00;
  }

  /* ---------- ปุ่มกลับหน้าหลัก ---------- */
  .home-btn {
    position:fixed; top:12px; left:14px; z-index:100;
    background:#fff; border-radius:20px; padding:8px 16px;
    font-size:clamp(14px,3.6vw,17px); font-weight:bold; color:#0f766e;
    box-shadow:0 3px 8px rgba(0,0,0,.15);
    text-decoration:none; display:flex; align-items:center; gap:6px;
  }
  .home-btn:active { transform:translateY(2px); }

  /* ---------- หน้าเกม ---------- */
  .topbar {
    width:100%; flex:none;
    display:flex; justify-content:center; align-items:center;
    margin-bottom:8px;
  }
  .progress-text {
    background:#fff; border-radius:24px; padding:6px 16px;
    font-size:clamp(16px,4vw,20px); font-weight:bold; color:#1d4ed8;
    box-shadow:0 3px 8px rgba(0,0,0,.12);
  }
  .progress-bar { width:100%; max-width:min(92vw,440px); flex:none; height:14px; background:#ffffffaa; border-radius:10px; overflow:hidden; margin-bottom:20px; }
  .progress-fill { height:100%; width:0%; background:linear-gradient(90deg,#34d399,#10b981); border-radius:10px; transition:width .4s; }

  /* ---------- กล่องประโยคเลื่อน (teleprompter) ---------- */
  .lines-viewport {
    width:100%; max-width:min(92vw,440px); min-height:160px; overflow:visible;
    background:#fff; border-radius:32px; box-shadow:0 6px 16px rgba(0,0,0,.12);
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    gap:10px; padding:20px 16px; margin-bottom:18px;
  }
  .line-row {
    width:100%; text-align:center; line-height:1.3;
    transition: opacity .45s ease, transform .45s ease, color .35s ease, font-size .35s ease;
    opacity:1; transform:translateY(0);
  }
  .line-row.locked { color:#cbd5e1; font-size:clamp(14px,3.6vw,17px); font-weight:600; }
  .line-row.active { color:#1e293b; font-size:clamp(24px,6.5vw,34px); font-weight:800; }
  .line-row.done { opacity:0; transform:translateY(-36px); }
  .line-row.incoming { opacity:0; transform:translateY(16px); }

  #listenBtn { font-size:clamp(15px,3.8vw,18px); padding:10px 22px; background:#60a5fa; color:#fff; margin-bottom:14px; }
  #nextBtn {
    font-size:clamp(21px,5.4vw,27px); padding:20px 24px; width:100%; max-width:min(92vw,440px);
    background:linear-gradient(180deg,#86efac,#22c55e); color:#052e16;
  }

  /* ---------- หน้าจบ ---------- */
  #endScreen h1 { font-size:clamp(28px,6.5vw,40px); color:#b45309; text-shadow:2px 2px 0 #fff; margin-bottom:10px; }
  #endScreen .trophy { font-size:clamp(60px,16vw,90px); animation:bounce 1.6s infinite; }
  #againBtn { font-size:clamp(20px,5vw,26px); padding:16px 44px; background:linear-gradient(180deg,#a78bfa,#8b5cf6); color:#fff; margin-top:20px; }
  .home-link-btn {
    font-size:clamp(17px,4.2vw,22px); padding:12px 34px; margin-top:12px;
    background:#e2e8f0; color:#334155; text-decoration:none;
    display:inline-flex; align-items:center; justify-content:center;
  }
</style>
</head>
<body>

<a href="index.html" class="home-btn">🏠 หน้าหลัก</a>

<!-- หน้าเริ่ม -->
<div class="screen active" id="introScreen">
  <div class="mascot">📖</div>
  <h1 class="title">เกมอ่านคล่อง</h1>
  <p class="subtitle">อ่านเรื่องสั้นทีละบรรทัด<br>อ่านจบแล้วกดปุ่มไปบรรทัดถัดไปได้เลย</p>
  <p class="subtitle" id="greetLine" style="margin-top:-10px;"></p>
  <button class="big-btn primary-btn" id="startBtn">▶ เริ่มอ่าน</button>
</div>

<!-- หน้าเล่นเกม -->
<div class="screen" id="gameScreen">
  <div class="topbar">
    <div class="progress-text" id="progressText">บรรทัด 1/22</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="lines-viewport" id="linesViewport"></div>

  <button class="big-btn" id="listenBtn">🔊 ฟังตัวอย่าง</button>
  <button class="big-btn" id="nextBtn">อ่านแล้ว ➡️ ถัดไป</button>
</div>

<!-- หน้าจบ -->
<div class="screen" id="endScreen">
  <div class="trophy">🏆</div>
  <h1>อ่านจบแล้ว!</h1>
  <p class="subtitle">เก่งมากเลย 🎉</p>
  <button class="big-btn" id="againBtn">🔄 อ่านอีกครั้ง</button>
  <a href="index.html" class="big-btn home-link-btn">🏠 กลับหน้าหลัก</a>
</div>

<script>
// ================== เนื้อเรื่องสำหรับอ่านคล่อง (เรียงลำดับตามเรื่อง ห้ามสลับ) ==================
const LINES = [
  "ในวันหยุด พี่พาฉัน ไปตลาด",
  "ที่มีผู้คน หญิงชาย",
  "มากันมากมาย",
  "เพื่อเลือกซื้อสิ่งของ",
  "พวกของกินของใช้",
  "บ้างก็ต้องการ",
  "เนื้อสัตว์ ผักผลไม้",
  "คุณแม่สั่งซื้อ",
  "องุ่น แตงโม",
  "กล้วย ส้ม ผักต่างๆ",
  "รวมทั้ง กุ้งหอย",
  "ปูปลา ผักคะน้า",
  "ผักกาดขาว",
  "คุณพ่ออยากได้",
  "รองเท้าไว้ใส่",
  "สำหรับออกกำลังกาย",
  "ก่อนกลับเราทั้งคู่",
  "กินขนมปังร้านประจำ",
  "เมื่อถึงบ้านทุกคน",
  "ช่วยกันทำอาหาร",
  "เสร็จแล้วรับประทาน",
  "ด้วยกันอย่างมีความสุข"
];
const TOTAL_LINES = LINES.length;
const LOOKAHEAD = 2; // จำนวนบรรทัดที่ยังไม่ปลดล็อกที่โชว์ล่วงหน้า (สีเทา)

const COMPLETE_KEY = "fluency_game_p1_completions";

// ================== ตัวแปรเกม ==================
let lineIdx = 0;
let audioCtx = null;

const $ = id => document.getElementById(id);
// ชื่อผู้เล่น — ใช้ชื่อที่ตั้งไว้ที่หน้าแรกของเว็บ ไม่ต้องพิมพ์ซ้ำทุกครั้ง
const NAME_KEY = "p1_player_name";
let playerName = (localStorage.getItem(NAME_KEY) || "").trim();
if (!playerName) location.href = "index.html";
else { const g = document.getElementById("greetLine"); if (g) g.textContent = `สวัสดี ${playerName}! พร้อมอ่านหรือยัง? 😊`; }

function markCompleted(name){
  try {
    const list = JSON.parse(localStorage.getItem(COMPLETE_KEY)) || [];
    list.push({ name, ts: Date.now() });
    localStorage.setItem(COMPLETE_KEY, JSON.stringify(list.slice(-100)));
  } catch(e){}
}

// ================== เสียงพูดตัวอย่าง (TTS) ==================
function speak(text){
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "th-TH"; u.rate = 0.8;
    const v = speechSynthesis.getVoices().find(v => v.lang && v.lang.startsWith("th"));
    if (v) u.voice = v;
    speechSynthesis.speak(u);
  }catch(e){}
}
if ('speechSynthesis' in window) speechSynthesis.getVoices();

// ================== เริ่มเกม ==================
function startGame(){
  lineIdx = 0;
  showScreen("gameScreen");
  renderInitialViewport();
  updateProgress();
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(id).classList.add("active");
}

function makeLineRow(idx, state){
  const row = document.createElement("div");
  row.className = "line-row " + state;
  row.dataset.idx = idx;
  row.textContent = LINES[idx];
  return row;
}

function renderInitialViewport(){
  const vp = $("linesViewport");
  vp.innerHTML = "";
  vp.appendChild(makeLineRow(lineIdx, "active"));
  for (let i = 1; i <= LOOKAHEAD; i++){
    if (lineIdx + i < TOTAL_LINES) vp.appendChild(makeLineRow(lineIdx + i, "locked"));
  }
}

function updateProgress(){
  $("progressText").textContent = `บรรทัด ${lineIdx+1}/${TOTAL_LINES}`;
  $("progressFill").style.width = (lineIdx/TOTAL_LINES*100) + "%";
}

function currentLineText(){ return LINES[lineIdx]; }

// เลื่อนบรรทัดที่อ่านจบแล้วขึ้น+จางหาย แล้วปลดล็อกบรรทัดถัดไปขึ้นมาแทน
function advanceLine(){
  const vp = $("linesViewport");
  const activeRow = vp.querySelector(`.line-row[data-idx="${lineIdx}"]`);
  if (activeRow){
    activeRow.classList.remove("active");
    activeRow.classList.add("done");
    setTimeout(()=>{ if (activeRow.parentNode) activeRow.remove(); }, 480);
  }

  playTone();
  lineIdx++;

  if (lineIdx >= TOTAL_LINES){
    setTimeout(endGame, 500);
    return;
  }

  setTimeout(()=>{
    const nextRow = vp.querySelector(`.line-row[data-idx="${lineIdx}"]`);
    if (nextRow){
      nextRow.classList.remove("locked");
      nextRow.classList.add("active");
    }
    const newIdx = lineIdx + LOOKAHEAD;
    if (newIdx < TOTAL_LINES){
      const row = makeLineRow(newIdx, "locked incoming");
      vp.appendChild(row);
      requestAnimationFrame(()=> requestAnimationFrame(()=>{ row.classList.remove("incoming"); }));
    }
    updateProgress();
  }, 220);
}

// ================== เอฟเฟกต์เสียงตอนกดถัดไป ==================
function playTone(){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = 660; o.type = "sine";
    const t = audioCtx.currentTime;
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.2);
    o.start(t); o.stop(t+0.25);
  }catch(e){}
}

// ================== จบเกม ==================
function endGame(){
  $("progressFill").style.width = "100%";
  markCompleted(playerName);
  showScreen("endScreen");
  speak("เก่งมากๆเลย อ่านจบแล้ว");
}

// ================== Events ==================
$("startBtn").onclick = () => {
  playTone();                // ปลดล็อกเสียงบน iOS
  speechSynthesis.cancel();  // ปลดล็อก TTS
  startGame();
};
$("listenBtn").onclick = () => speak(currentLineText());
$("nextBtn").onclick   = () => advanceLine();
$("againBtn").onclick  = () => showScreen("introScreen");
</script>
</body>
</html>
